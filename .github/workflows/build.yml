name: CI

on:
  pull_request:
  push:
    branches:
      - 'master'

jobs:
  build:
    name: Build
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        name: [
          Debian,
        ]
        include:
          - name: Debian
            os: ubuntu-latest
            container: debian:testing
            env:
              TARGET: 'sh -xe'

    env: ${{ matrix.env }}
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}

    steps:
      - uses: actions/checkout@v1

      - name: Install Debian Testing dependencies
        if: matrix.name == 'Debian'
        run: |
          sed -i '/^Types/ s/deb/& deb-src/' /etc/apt/sources.list.d/debian.sources
          apt-get update
          apt-get upgrade -y
          apt-get install -y \
            git \
            gcc \
            ninja-build \
            meson \
            pkg-config \
            libglib2.0-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libxml2-dev \
            libinput-dev \
            libpng-dev \
            librsvg2-dev \
            xwayland \
            libwayland-client0 \
            libwayland-dev \
            wayland-protocols \
            libsfdo-dev \
            libxkbcommon-dev \
            libyaml-dev \
            libcyaml-dev \
            scdoc

      # These builds are executed on all runners
      - name: Build with gcc
        run: |
          echo '
            cd "$GITHUB_WORKSPACE"
            export CC=gcc
            meson setup build-gcc --werror
            meson compile -C build-gcc
          ' | $TARGET

